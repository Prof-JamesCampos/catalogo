<!DOCTYPE html>
<!--<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">-->
<html lang="pt-br" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC Catálogo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios/novo}">Novo usuário</a>
                </li>
            </ul>


            <div class="d-flex align-items-center">

                <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                    Olá, <strong sec:authentication="name">Usuário</strong>
                </span>

                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-light btn-sm text-primary fw-bold">Sair</button>
                </form>

                <a class="btn btn-light btn-sm" th:href="@{/login}" sec:authorize="!isAuthenticated()">
                    Entrar
                </a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white d-flex justify-content-between align-items-center" sec:authorize="hasRole('ADMIN')">
            <h2 class="mb-0">Lista de Produtos</h2>
            <a href="/produtos/novo" class="btn btn-success">Novo Produto</a>
        </div>
        <div class="card-body">
            <table class="table table-hover">
                <form th:action="@{/produtos}" method="get" class="d-flex mb-3">
                    <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                        <input type="text"
                               name="nome"
                               class="form-control search-input border-start-0"
                               placeholder="Buscar produto por nome..."
                               aria-label="Buscar produto"
                               th:value="${param.nome}">
                        <button class="btn btn-primary btn-search px-4" type="submit">
                            Buscar
                        </button>
                        <a th:if="${param.nome}"
                           th:href="@{/produtos}"
                           class="btn btn-outline-secondary"
                           title="Limpar busca">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>
                    <small class="text-muted ms-1" th:if="${param.nome}">
                        Exibindo resultados para: <strong th:text="${param.nome}"></strong>
                    </small>
                </form>
                <br>
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Preço (R$)</th>
                    <th class="text-center">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"
                        th:classappend="${p.valor > 1000} ? 'text-danger fw-bold' : ''">
                    </td>
                    <td class="text-center" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/produtos/editar/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-warning">Editar</a>

                        <a th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Tem certeza que deseja remover este produto?')">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center">
                Nenhum produto cadastrado no momento.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
