    <!DOCTYPE html>
    <html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cadastrar Produto</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        </head>
        <body class="bg-light">
            <nav class="navbar navbar-dark bg-primary mb-4">
                <div class="container">
                    <a class="navbar-brand" href="/produtos">FATEC - Catálogo</a>
                </div>
            </nav>

            <div class="container">
                <div class="card shadow mx-auto" style="max-width: 500px;">
                    <div class="card-header bg-white">
                        <h2 class="mb-0">Novo Produto</h2>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post">
                            <input type="hidden" th:field="*{idProduto}">

                            <div class="mb-3">
                                <label class="form-label">Nome do Produto</label>
                                <input type="text" th:field="*{nome}" class="form-control"
                                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Preço (R$)</label>
                                <input type="number" step="0.01" th:field="*{valor}" class="form-control"
                                       th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                            </div>

                            <button type="submit" class="btn btn-primary">Salvar</button>
                        </form>
                    </div>
                </div>
            </div>
        </body>
    </html>
