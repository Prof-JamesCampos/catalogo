<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Editar Produto</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="card shadow mx-auto" style="max-width: 500px;">
                <div class="card-header"><h2>Editar Produto</h2></div>
                <div class="card-body">
                    <form th:action="@{/produtos/editar/{id}(id=${produto.idProduto})}" th:object="${produto}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" th:field="*{nome}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor</label>
                            <input type="number" step="0.01" th:field="*{valor}" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Atualizar</button>
                        <a href="/produtos" class="btn btn-secondary">Voltar</a>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
